<!DOCTYPE html>
<html>
<head>

  <style>

      font-family: Arial;
      padding: 40px;
    }
    button {
      padding: 12px 20px;
      background: red;
      color: white;
      border: none;

    #content {

<body>

<h2>Watch Ad to Unlock 🔒</h2>

<button onclick="watchAd()">Watch Ad</button>

<div id="content">
  <h3>Unlocked 🔓</h3>
  <p>Your secret content goes here</p>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  function watchAd() {
    alert("Ad coming soon...");

    // temporary unlock
    document.getElementById("content").style.display = "block";
  }
</script>

</body>
</html>
